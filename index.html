<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Smart ATM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ATM CARD */
.atm{
    width:380px;
    padding:25px;
    border-radius:20px;
    background: linear-gradient(145deg,#1a1a2e,#16213e);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    border:2px solid #00d4ff;
    animation: fadeIn 1s ease;
}

/* TITLE */
h2{
    text-align:center;
    color:#00d4ff;
    margin-bottom:20px;
    text-shadow:0 0 10px #00d4ff;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:2px solid #333;
    background:#111;
    color:white;
    margin:10px 0;
    transition:0.3s;
}
input:focus{
    border-color:#00d4ff;
    box-shadow:0 0 10px #00d4ff;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

/* BUTTON COLORS */
.deposit{background:#00ff88;}
.withdraw{background:#ff6b6b;}
.balance{background:#00d4ff;}

button:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* SCREEN TEXT */
#output{
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
    background:#000;
    color:#00ff88;
    min-height:30px;
    animation: fadeIn 0.5s;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="atm">
    <h2>🏧 Smart ATM</h2>

    <input type="number" id="amount" placeholder="💰 Enter Amount">

    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>
    <button class="balance" onclick="checkBalance()">Check Balance</button>

    <div id="output"></div>
</div>

<script>
const API = "http://127.0.0.1:5000";

function show(msg, color="lightgreen"){
    let out = document.getElementById("output");
    out.innerText = msg;
    out.style.color = color;
}

async function deposit(){
    let amount = document.getElementById("amount").value;
    let pin = prompt("Enter PIN:");

    let res = await fetch(API+"/deposit",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({amount:Number(amount), pin:Number(pin)})
    });

    let data = await res.json();

    if(data.status==="success"){
        show("✅ Deposit Success | Balance: ₹"+data.balance);
    }else{
        show("❌ "+data.msg,"red");
    }
}

async function withdraw(){
    let amount = document.getElementById("amount").value;
    let pin = prompt("Enter PIN:");

    let res = await fetch(API+"/withdraw",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({amount:Number(amount), pin:Number(pin)})
    });

    let data = await res.json();

    if(data.status==="success"){
        show("💸 Withdraw Success | Balance: ₹"+data.balance);
    }else{
        show("❌ "+data.msg,"red");
    }
}

async function checkBalance(){
    let pin = prompt("Enter PIN:");

    let res = await fetch(API+"/balance",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pin:Number(pin)})
    });

    let data = await res.json();

    if(data.status==="success"){
        show("💳 Balance: ₹"+data.balance);
    }else{
        show("❌ "+data.msg,"red");
    }
}
</script>

</body>
</html>
