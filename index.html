<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏧 Smart ATM - Bank Account System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .atm-container {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 450px;
            max-width: 90vw;
            border: 3px solid #00d4ff;
            position: relative;
            overflow: hidden;
        }

        .atm-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #00d4ff, #00ff88, #ffaa00, #ff6b6b);
            background-size: 300% 100%;
            animation: glow 2s linear infinite;
        }

        @keyframes glow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .screen {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 200px;
            position: relative;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .screen-header {
            color: #00ff88;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .balance-display {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
            text-align: center;
            margin: 15px 0;
            text-shadow: 0 0 10px #00d4ff;
        }

        .message {
            background: rgba(0,212,255,0.1);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
            margin: 10px 0;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 10px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-full {
            grid-column: 1 / -1;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group label {
            display: block;
            color: #00ff88;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }

        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin: 10px 0;
            min-height: 20px;
        }

        .success { background: rgba(0,255,136,0.2); color: #00ff88; border: 1px solid #00ff88; }
        .error { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .info { background: rgba(0,212,255,0.2); color: #00d4ff; border: 1px solid #00d4ff; }

        .atm-title {
            text-align: center;
            color: #fff;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff;
        }

        .hidden {
            display: none !important;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .keypad-btn {
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border: none;
            padding: 20px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .keypad-btn:hover {
            background: linear-gradient(145deg, #3498db, #2980b9);
            transform: scale(1.05);
        }

        .keypad-btn:active {
            transform: scale(0.98);
        }

        .backspace {
            background: linear-gradient(145deg, #e74c3c, #c0392b) !important;
        }
    </style>
</head>
<body>
    <div class="atm-container">
        <h1 class="atm-title">🏧 Smart ATM</h1>
        
        <div class="screen">
            <div class="screen-header">Welcome, shyam prajapat!</div>
            <div class="balance-display" id="balanceDisplay">$1,000.00</div>
            <div id="messageArea"></div>
        </div>

        <div id="mainMenu">
            <div class="menu">
                <button class="btn" onclick="showDeposit()">💰 Deposit</button>
                <button class="btn" onclick="showWithdraw()">💸 Withdraw</button>
                <button class="btn" onclick="showBalance()">💳 Balance</button>
                <button class="btn" onclick="showPinChange()">🔐 Change PIN</button>
                <button class="btn btn-full" onclick="showAdmin()">⚙️ Admin Access</button>
                <button class="btn btn-full" onclick="exitATM()">🚪 Exit</button>
            </div>
        </div>

        <!-- Deposit Form -->
        <div id="depositForm" class="hidden">
            <div class="input-group">
                <label>Enter Amount to Deposit:</label>
                <input type="number" class="input-field" id="depositAmount" placeholder="0.00" min="1">
            </div>
            <div class="menu">
                <button class="btn" onclick="processDeposit()">✅ Deposit</button>
                <button class="btn" onclick="showMainMenu()">🔙 Back</button>
            </div>
        </div>

        <!-- Withdraw Form -->
        <div id="withdrawForm" class="hidden">
            <div class="input-group">
                <label>Enter Amount to Withdraw:</label>
                <input type="number" class="input-field" id="withdrawAmount" placeholder="0.00" min="1">
            </div>
            <div class="menu">
                <button class="btn" onclick="processWithdraw()">✅ Withdraw</button>
                <button class="btn" onclick="showMainMenu()">🔙 Back</button>
            </div>
        </div>

        <!-- PIN Change Form -->
        <div id="pinChangeForm" class="hidden">
            <div class="input-group">
                <label>Old PIN:</label>
                <input type="password" class="input-field" id="oldPin" placeholder="••••">
            </div>
            <div class="input-group">
                <label>New PIN:</label>
                <input type="password" class="input-field" id="newPin" placeholder="••••">
            </div>
            <div class="menu">
                <button class="btn" onclick="processPinChange()">✅ Change PIN</button>
                <button class="btn" onclick="showMainMenu()">🔙 Back</button>
            </div>
        </div>

        <!-- Admin Access -->
        <div id="adminForm" class="hidden">
            <div class="status info">🔒 ATM Internal Access</div>
            <div class="balance-display" id="adminBalance">$1,000.00</div>
            <button class="btn btn-full" onclick="showMainMenu()">🔙 Back</button>
        </div>

        <div id="statusArea" class="status hidden"></div>
    </div>

    <script>
        // ATM State
        let balance = 1000;
        let pin = 1234;
        let currentPin = 1234;

        // Update displays
        function askPin() {
    const enteredPin = prompt("🔐 Enter your PIN:");
    if (parseInt(enteredPin) === pin) {
        return true;
    } else {
        showStatus("❌ Wrong PIN!", "error");
        return false;
    }
}
        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = `$${balance.toLocaleString()}.00`;
            document.getElementById('adminBalance').textContent = `$${balance.toLocaleString()}.00`;
        }

        function showMessage(msg, type = 'info') {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                messageArea.innerHTML = '';
            }, 4000);
        }

        function showStatus(msg, type) {
            const statusArea = document.getElementById('statusArea');
            statusArea.textContent = msg;
            statusArea.className = `status ${type}`;
            statusArea.classList.remove('hidden');
        }

        // Navigation
        function showMainMenu() {
            hideAllForms();
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('statusArea').classList.add('hidden');
        }

        function hideAllForms() {
            const forms = ['depositForm', 'withdrawForm', 'pinChangeForm', 'adminForm'];
            forms.forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
        }

        function showDeposit() {
            if (!askPin()) return;
            if (!askPin()) return;
            hideAllForms();
            document.getElementById('depositForm').classList.remove('hidden');
        }

        function showWithdraw() {
            if (!askPin()) return;
            hideAllForms();
            document.getElementById('withdrawForm').classList.remove('hidden');
        }

        function showBalance() {
            if (!askPin()) return;
            showMessage(`💰 Current Balance: $${balance.toLocaleString()}.00`);
            showMainMenu();
        }

        function showPinChange() {
            if (!askPin()) return;
            hideAllForms();
            document.getElementById('pinChangeForm').classList.remove('hidden');
        }

        function showAdmin() {
            if (!askPin()) return;
            hideAllForms();
            document.getElementById('adminForm').classList.remove('hidden');
        }

        // Process transactions
        function processDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            if (amount > 0) {
                balance += amount;
                updateBalance();
                showMessage(`✅ Deposited: $${amount.toLocaleString()}`);
                showStatus('✅ Deposit Successful!', 'success');
            } else {
                showStatus('❌ Invalid Amount!', 'error');
            }
            document.getElementById('depositAmount').value = '';
            setTimeout(showMainMenu, 1500);
        }

        function processWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            if (amount > balance) {
                showStatus('❌ Insufficient Balance!', 'error');
            } else if (amount > 0) {
                balance -= amount;
                updateBalance();
                showMessage(`✅ Withdrawn: $${amount.toLocaleString()}`);
                showStatus('✅ Withdrawal Successful!', 'success');
            } else {
                showStatus('❌ Invalid Amount!', 'error');
            }
            document.getElementById('withdrawAmount').value = '';
            setTimeout(showMainMenu, 1500);
        }

        function processPinChange() {
            const oldPin = parseInt(document.getElementById('oldPin').value);
            const newPin = parseInt(document.getElementById('newPin').value);
            
            if (oldPin === pin && newPin.toString().length === 4) {
                pin = newPin;
                showMessage('✅ PIN Changed Successfully!');
                showStatus('🔐 PIN Updated!', 'success');
            } else {
                showStatus('❌ Wrong Old PIN or Invalid New PIN!', 'error');
            }
            document.getElementById('oldPin').value = '';
            document.getElementById('newPin').value = '';
            setTimeout(showMainMenu, 1500);
        }

        function exitATM() {
            showMessage('👋 Thank you for using Smart ATM!');
            setTimeout(() => {
                alert('Session ended. Refresh to restart.');
            }, 500);
        }

        // Initialize
        updateBalance();
        showMainMenu();
    </script>
</body>
</html>
